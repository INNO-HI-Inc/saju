<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만세력 · 사주 자동 계산</title>
<meta name="description" content="생년월일시로 사주 원국·신강약·용신·대운·세운을 즉시 계산합니다. 브라우저에서 바로 계산(서버 전송 없음).">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="logo">☯</span> 만세력</div>
  <div class="tagline">생년월일시로 사주를 즉시 계산 · 브라우저에서 바로 처리</div>
</header>

<main>
  <!-- 입력 -->
  <section class="input-card" id="inputCard">
    <div class="fields">
      <label class="fld"><span>연도</span><input type="number" id="y" value="1998" min="1900" max="2100"></label>
      <label class="fld"><span>월</span><input type="number" id="mo" value="6" min="1" max="12"></label>
      <label class="fld"><span>일</span><input type="number" id="d" value="8" min="1" max="31"></label>
      <label class="fld"><span>시</span><input type="number" id="h" value="10" min="0" max="23"></label>
      <label class="fld"><span>분</span><input type="number" id="mi" value="0" min="0" max="59"></label>
      <div class="fld gender">
        <span>성별</span>
        <div class="seg">
          <button type="button" data-g="F" class="on">여자</button>
          <button type="button" data-g="M">남자</button>
        </div>
      </div>
      <label class="fld chk"><input type="checkbox" id="latezi"><span>야자시</span></label>
    </div>
    <button class="go" id="go">만세력 보기</button>
  </section>

  <section id="result"></section>
  <footer class="foot">
    계산 엔진: 결정론 만세력(오차 0) · 절기 로컬 천문계산 · 해석은 LLM 레이어(분리)<br>
    ⓘ 신강약 밴드·인구분포·용신은 유파/통계별 보정 대상입니다.
  </footer>
</main>

<script src="js/saju-engine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
