<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만세력 · 사주 계산</title>
<meta name="description" content="생년월일시로 사주 원국·신강약·용신·대운을 즉시 계산합니다. 브라우저에서 바로 처리(서버 전송 없음).">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%98%AF%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/toss/tossface@main/dist/tossface.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 네비게이션 -->
<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="./"><span class="logo-mark">☯</span> 만세력</a>
    <div class="nav-right">
      <span class="nav-link">브라우저에서 즉시 계산</span>
      <button class="nav-cta" id="loadBtn2">저장된 만세력</button>
    </div>
  </div>
</nav>

<main class="container">

  <!-- ① 입력 -->
  <section class="screen" id="inputScreen">
    <div class="hero">
      <h1 class="h1">사주 <span class="accent">만세력</span></h1>
      <p class="hero-sub">생년월일시만 입력하면 원국·신강약·용신·대운·세운까지 한 번에.</p>
    </div>

    <div class="card input-card">
      <div class="form-grid">
        <div class="field span2">
          <label class="flabel" for="name">이름</label>
          <input class="tinput" type="text" id="name" maxlength="12" placeholder="최대 12글자">
        </div>

        <div class="field">
          <label class="flabel">성별</label>
          <div class="segment" id="genderSeg">
            <button type="button" class="seg-btn on" data-g="F">여자</button>
            <button type="button" class="seg-btn" data-g="M">남자</button>
          </div>
        </div>

        <div class="field">
          <label class="flabel" for="city">도시 <span class="lopt">선택 · 진태양시 보정</span></label>
          <div class="search-wrap" id="cityWrap">
            <input class="tinput" type="text" id="city" placeholder="예: 서울" autocomplete="off">
            <span class="mag-ico">⌕</span>
            <ul class="city-list" id="cityList"></ul>
          </div>
          <div class="city-hint" id="cityHint"></div>
        </div>

        <div class="field span2">
          <div class="flabel-row">
            <label class="flabel">생년월일시</label>
            <button type="button" class="link-btn" id="ganjiBtn">12간지 시간표</button>
          </div>
          <div class="dob-row">
            <div class="select-wrap">
              <select class="tselect" id="calendar">
                <option value="S">양력</option>
                <option value="L">음력</option>
                <option value="LL">음력(윤달)</option>
              </select>
              <span class="chev">▾</span>
            </div>
            <input class="tinput date" type="date" id="birthday" value="1998-06-08" min="1901-01-01" max="2099-12-31">
            <input class="tinput time" type="time" id="birthtime" value="10:00">
          </div>
          <div class="opt-row">
            <label class="radio"><input type="checkbox" id="hmUnsure"><span class="dot"></span>시간 모름</label>
            <label class="radio"><input type="checkbox" id="lateZi"><span class="dot"></span>야자시/조자시</label>
          </div>
        </div>
      </div>

      <button class="btn-primary" id="go">만세력 보기</button>
      <button class="btn-ghost" id="loadBtn">저장된 만세력 불러오기</button>
    </div>

    <p class="disclaimer">계산은 브라우저에서 즉시 처리되며 어디에도 전송되지 않습니다. · 절기 천문계산 · 신강약/용신은 유파별 보정 대상입니다.</p>
  </section>

  <!-- ② 결과 -->
  <section class="screen hidden" id="resultScreen">
    <div class="result-bar">
      <button class="back" id="backBtn">‹ 다시 입력</button>
      <div class="rb-actions">
        <button class="rb-btn" id="imgBtn">⤓ 이미지 저장</button>
        <button class="rb-btn save" id="saveBtn">저장하기</button>
      </div>
    </div>
    <div id="result"></div>
  </section>

</main>

<footer class="site-foot">☯ 만세력 · 결정론 계산 엔진(오차 0) + 절기 로컬 천문계산 · 오픈소스</footer>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js"></script>
<script src="js/saju-engine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
